---
layout: default
navtype: home
---

<div class="content-container">
  <div class="post-container">
    {% for post in paginator.posts %}
      <a href="{{ post.url | prepend: site.baseurl }}"  class="post-box">
        <span class="post-date">
          {{ post.date | date: "%Y-%m-%d" }}
        </span>
        <h2>
          {{ post.title }}
        </h2>
        <p>{{ post.summary }}</p>
      </a>
    {% endfor %}
  </div>
</div>
